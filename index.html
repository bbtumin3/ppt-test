<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 智能批量填字</title>
    <!-- 引入核心依赖库（纯前端，无需后端） -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ppt-parser@1.2.0/dist/ppt-parser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            max-width: 750px;
            margin: 0 auto;
            padding: 25px 15px;
            line-height: 1.5;
            color: #222;
            background-color: #fff;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .module {
            margin-bottom: 32px;
            padding: 18px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
        }
        .module h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .file-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px dashed #ccc;
            border-radius: 6px;
            cursor: pointer;
            background-color: #fafafa;
        }
        .tip {
            font-size: 14px;
            color: #666;
            margin: 6px 0;
        }
        textarea {
            width: 100%;
            min-height: 75px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            line-height: 1.6;
        }
        .name-list {
            margin: 15px 0;
            padding: 12px;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            max-height: 220px;
            overflow-y: auto;
            background-color: #fafafa;
        }
        .name-item {
            padding: 3px 0;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 13px 0;
            background-color: #0071e3;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .status {
            font-size: 14px;
            margin: 8px 0;
        }
        .status-success {
            color: #0071e3;
        }
        .status-error {
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <h1>PPT 智能批量填字</h1>

    <!-- 模块1：PPT模板导入（和原工具完全对齐） -->
    <div class="module">
        <h2>📂 1 PPT 模板</h2>
        <input type="file" id="pptFile" accept=".pptx" class="file-input">
        <p class="tip">💡 微信/QQ文件导入技巧：先在微信/QQ里把文件保存到手机，再从这里选择文件</p>
        <p class="status" id="pptStatus">未上传PPT模板</p>
    </div>

    <!-- 模块2：名单识别（和原工具完全对齐） -->
    <div class="module">
        <h2>📷 2 名单识别</h2>
        <input type="file" id="nameImage" accept="image/*" capture="camera" class="file-input">
        <p class="tip">拍照/上传名单图片，自动识别生成名单</p>
        <p class="status" id="ocrStatus">未识别名单</p>
        <div class="name-list" id="nameList">
            <p class="name-item">名单列表 (已自动优化):</p>
            <p class="name-item">0 行</p>
        </div>
    </div>

    <!-- 模块3：祝福语模板（和原工具完全对齐） -->
    <div class="module">
        <h2>✏️ 3 祝福语模板</h2>
        <textarea id="greetingTemplate">恭喜XXX营服当日高套封闭[庆祝][庆祝][庆祝]</textarea>
        <p class="tip">用XXX作为名字占位符，生成时会自动替换为对应姓名</p>
    </div>

    <!-- 生成按钮 -->
    <button id="generateBtn" disabled>生成并下载PPT</button>

    <script>
        // 全局变量
        let pptTemplate = null; // 解析后的PPT模板
        let nameList = []; // 识别后的名单列表
        const ocrWorker = Tesseract.createWorker(); // OCR引擎（纯前端，无数据上传）

        // 初始化OCR中文识别引擎
        async function initOCR() {
            await ocrWorker.load();
            await ocrWorker.loadLanguage('chi_sim');
            await ocrWorker.initialize('chi_sim');
        }
        initOCR();

        // 1. 处理PPT模板上传与解析
        const pptFileInput = document.getElementById('pptFile');
        const pptStatus = document.getElementById('pptStatus');
        const generateBtn = document.getElementById('generateBtn');

        pptFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 校验文件格式
            if (!file.name.endsWith('.pptx')) {
                pptStatus.textContent = '请上传.pptx格式的PPT文件';
                pptStatus.className = 'status status-error';
                return;
            }

            try {
                pptStatus.textContent = '正在解析PPT模板...';
                pptStatus.className = 'status status-success';
                
                // 解析PPT文件
                const arrayBuffer = await file.arrayBuffer();
                const parsed = await pptParser.parsePPT(arrayBuffer);
                pptTemplate = parsed;

                pptStatus.textContent = `PPT模板解析成功！共${pptTemplate.slides.length}页`;
                pptStatus.className = 'status status-success';
                updateBtnStatus();
            } catch (err) {
                console.error('PPT解析失败：', err);
                pptStatus.textContent = 'PPT解析失败，请重试';
                pptStatus.className = 'status status-error';
            }
        });

        // 2. 处理名单图片OCR识别
        const nameImageInput = document.getElementById('nameImage');
        const ocrStatus = document.getElementById('ocrStatus');
        const nameListDom = document.getElementById('nameList');

        nameImageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                ocrStatus.textContent = '正在识别名单...';
                ocrStatus.className = 'status status-success';
                
                // OCR识别图片文本
                const { data: { text } } = await ocrWorker.recognize(file);
                
                // 优化名单：按行分割、去空行、去多余空格、过滤无效内容
                nameList = text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0);
                
                // 更新页面显示
                ocrStatus.textContent = `名单识别成功！共识别到${nameList.length}个姓名`;
                ocrStatus.className = 'status status-success';
                renderNameList();
                updateBtnStatus();
            } catch (err) {
                console.error('OCR识别失败：', err);
                ocrStatus.textContent = '名单识别失败，请重试';
                ocrStatus.className = 'status status-error';
            }
        });

        // 渲染名单列表
        function renderNameList() {
            let html = `<p class="name-item">名单列表 (已自动优化):</p>`;
            html += `<p class="name-item">${nameList.length} 行</p>`;
            nameList.forEach((name, index) => {
                html += `<p class="name-item">${index + 1}. ${name}</p>`;
            });
            nameListDom.innerHTML = html;
        }

        // 更新生成按钮状态
        function updateBtnStatus() {
            generateBtn.disabled = !(pptTemplate && nameList.length > 0);
        }

        // 3. 核心：批量生成PPT
        const greetingTemplate = document.getElementById('greetingTemplate');
        generateBtn.addEventListener('click', async () => {
            if (!pptTemplate || nameList.length === 0) return;

            try {
                generateBtn.textContent = '正在生成PPT...';
                generateBtn.disabled = true;

                // 创建新PPT实例
                const newPpt = new PptxGenJS();
                const EMU_TO_INCH = 914400; // EMU转英寸单位（PPT标准单位转换）

                // 遍历每个姓名，批量生成页面
                for (const name of nameList) {
                    // 替换祝福语占位符
                    const finalGreeting = greetingTemplate.value.replace(/XXX/g, name);

                    // 复制模板的每一页，替换内容
                    for (const templateSlide of pptTemplate.slides) {
                        const newSlide = newPpt.addSlide();

                        // 遍历模板页的所有元素，还原样式+替换文本
                        for (const element of templateSlide.elements) {
                            // 处理文本元素（核心填字功能）
                            if (element.type === 'text' && element.text) {
                                // 替换占位符：XXX替换为姓名，{greeting}替换为完整祝福语
                                let finalText = element.text.replace(/XXX/g, name);
                                finalText = finalText.replace(/\{greeting\}/g, finalGreeting);

                                // 还原原文本的样式、位置、大小
                                newSlide.addText(finalText, {
                                    x: element.x / EMU_TO_INCH,
                                    y: element.y / EMU_TO_INCH,
                                    w: element.w / EMU_TO_INCH,
                                    h: element.h / EMU_TO_INCH,
                                    fontSize: element.fontSize || 16,
                                    color: element.color || '333333',
                                    bold: element.bold || false,
                                    italic: element.italic || false,
                                    align: element.align || 'left',
                                    fontFace: element.fontFace || '微软雅黑'
                                });
                            }

                            // 还原图片元素（保持模板原样）
                            if (element.type === 'image' && element.imageData) {
                                newSlide.addImage({
                                    data: element.imageData,
                                    x: element.x / EMU_TO_INCH,
                                    y: element.y / EMU_TO_INCH,
                                    w: element.w / EMU_TO_INCH,
                                    h: element.h / EMU_TO_INCH
                                });
                            }

                            // 还原形状元素（保持模板原样）
                            if (element.type === 'shape') {
                                newSlide.addShape(element.shapeType, {
                                    x: element.x / EMU_TO_INCH,
                                    y: element.y / EMU_TO_INCH,
                                    w: element.w / EMU_TO_INCH,
                                    h: element.h / EMU_TO_INCH,
                                    fill: { color: element.fillColor || 'ffffff' },
                                    line: { color: element.borderColor, width: element.borderWidth || 0 }
                                });
                            }
                        }
                    }
                }

                // 下载生成好的PPT
                await newPpt.writeFile({ fileName: '批量生成_填字PPT.pptx' });
                
                generateBtn.textContent = '生成并下载PPT';
                generateBtn.disabled = false;
                alert('PPT生成成功！已自动开始下载');
            } catch (err) {
                console.error('PPT生成失败：', err);
                alert('PPT生成失败，请重试');
                generateBtn.textContent = '生成并下载PPT';
                generateBtn.disabled = false;
            }
        });

        // 页面关闭时释放OCR资源
        window.addEventListener('beforeunload', async () => {
            await ocrWorker.terminate();
        });
    </script>
</body>
</html>
